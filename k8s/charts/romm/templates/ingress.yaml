{{- if .Values.romm.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "romm.fullname" . }}
  labels:
    {{- include "romm.labels" . | nindent 4 }}
  {{- with .Values.romm.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.romm.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.romm.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.romm.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.romm.ingress.path }}
            pathType: {{ .Values.romm.ingress.pathType }}
            backend:
              service:
                name: {{ include "romm.fullname" . }}
                port:
                  name: http
{{- end }}
