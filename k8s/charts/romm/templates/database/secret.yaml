{{/*
Create a chart-owned Secret with the DB user password when the user did not
provide an existing one and is not pulling it via ExternalSecret.
*/}}
{{- if and (not .Values.database.auth.existingSecret.name) (not .Values.database.auth.externalSecret.enabled) }}
{{- if not (eq .Values.database.type "external") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "romm.fullname" . }}-db
  labels:
    {{- include "romm.mariadb.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "database.auth.password is required when no existingSecret/externalSecret is given" .Values.database.auth.password | quote }}
{{- end }}
{{- end }}
---
{{/*
Root password Secret — only relevant when this chart owns the MariaDB instance.
*/}}
{{- if and (or (eq .Values.database.type "embedded") (eq .Values.database.type "operator")) (not .Values.database.auth.rootExistingSecret.name) (not .Values.database.auth.rootExternalSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "romm.fullname" . }}-db-root
  labels:
    {{- include "romm.mariadb.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "database.auth.rootPassword is required when no rootExistingSecret/rootExternalSecret is given" .Values.database.auth.rootPassword | quote }}
{{- end }}
