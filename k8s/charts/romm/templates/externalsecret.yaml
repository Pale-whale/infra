{{- if and .Values.romm.auth.externalSecret.enabled (not .Values.romm.auth.existingSecret.name) -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "romm.fullname" . }}-auth
  labels:
    {{- include "romm.labels" . | nindent 4 }}
spec:
  secretStoreRef: {{- .Values.romm.auth.externalSecret.secretStoreRef | toYaml | nindent 4 }}
  target:
    name: {{ include "romm.fullname" . }}-auth
  data:
    - secretKey: secret-key
      remoteRef:
        key: {{ .Values.romm.auth.externalSecret.remoteKey | quote }}
{{- end }}
{{- if and .Values.romm.oidc.enabled .Values.romm.oidc.clientSecret.externalSecret.enabled (not .Values.romm.oidc.clientSecret.existingSecret.name) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "romm.fullname" . }}-oidc
  labels:
    {{- include "romm.labels" . | nindent 4 }}
spec:
  secretStoreRef: {{- .Values.romm.oidc.clientSecret.externalSecret.secretStoreRef | toYaml | nindent 4 }}
  target:
    name: {{ include "romm.fullname" . }}-oidc
  data:
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.romm.oidc.clientSecret.externalSecret.remoteKey | quote }}
{{- end }}

{{/*
ExternalSecret per metadata provider that opts into ESO.
The synced Secret has a single `value` key, matching `romm.providerCredEnv`.
*/}}
{{- $providerCreds := list
  (dict "key" "igdb"               "ref" .Values.romm.providers.igdb.clientSecret               "enabled" .Values.romm.providers.igdb.enabled)
  (dict "key" "screenscraper"      "ref" .Values.romm.providers.screenscraper.password          "enabled" .Values.romm.providers.screenscraper.enabled)
  (dict "key" "mobygames"          "ref" .Values.romm.providers.mobygames.apiKey                "enabled" .Values.romm.providers.mobygames.enabled)
  (dict "key" "steamgriddb"        "ref" .Values.romm.providers.steamgriddb.apiKey              "enabled" .Values.romm.providers.steamgriddb.enabled)
  (dict "key" "retroachievements"  "ref" .Values.romm.providers.retroachievements.apiKey        "enabled" .Values.romm.providers.retroachievements.enabled)
}}
{{- range $providerCreds }}
{{- if and .enabled .ref.externalSecret.enabled (not .ref.existingSecret.name) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ printf "%s-%s" (include "romm.fullname" $) .key }}
  labels:
    {{- include "romm.labels" $ | nindent 4 }}
spec:
  secretStoreRef: {{- .ref.externalSecret.secretStoreRef | toYaml | nindent 4 }}
  target:
    name: {{ printf "%s-%s" (include "romm.fullname" $) .key }}
  data:
    - secretKey: value
      remoteRef:
        key: {{ .ref.externalSecret.remoteKey | quote }}
{{- end }}
{{- end }}
